services:
  openclaw-wx-filehelper:
    image: openclaw-wx-filehelper:latest
    ports:
      - "${WX_API_PORT:-23051}:23051"
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    volumes:
      - openclaw-config:/home/node/.openclaw
      - wx-data:/app/wx-filehelper-api/downloads
    environment:
      - HOME=/home/node
      - OPENCLAW_GATEWAY_BIND=lan
      - TZ=${TZ:-Asia/Shanghai}
      - MODELS_API_KEY=${MODELS_API_KEY:-}
      - MODELS_BASE_URL=${MODELS_BASE_URL:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  openclaw-config:
  wx-data:
